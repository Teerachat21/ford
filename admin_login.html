<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - บันทึกรายรับรายจ่าย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-slate-800">Admin Login</h2>
            <p class="text-slate-500 mt-2">เฉพาะผู้ดูแลระบบเท่านั้น</p>
        </div>
        
        <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm"></div>

        <form id="admin-login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700">ชื่อผู้ใช้ (Admin)</label>
                <input type="text" id="username" required class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-slate-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">รหัสผ่าน</label>
                <input type="password" id="password" required class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-slate-500 transition">
            </div>
            <button type="submit" class="w-full bg-slate-800 text-white py-3 px-4 rounded-lg hover:bg-slate-700 transition font-semibold text-lg shadow-lg">
                เข้าสู่ระบบหลังบ้าน
            </button>
        </form>
        <div class="mt-6 text-center">
            <a href="index.html" class="text-slate-500 hover:text-slate-800 text-sm transition">← กลับหน้าหลักสำหรับผู้ใช้</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('admin-login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // ดึงข้อมูลผู้ใช้จาก localStorage (ใช้ข้อมูลเดียวกับหน้าหลัก)
            const users = JSON.parse(localStorage.getItem('users')) || [
                { id: 1, username: 'admin', password: 'admin8888', role: 'admin' }
            ];

            const adminUser = users.find(u => u.username === username && u.password === password && u.role === 'admin');

            if (adminUser) {
                localStorage.setItem('currentAdmin', JSON.stringify(adminUser));
                window.location.href = 'admin_panel.html';
            } else {
                errorMsg.innerText = 'ชื่อผู้ใช้หรือรหัสผ่าน Admin ไม่ถูกต้อง';
                errorMsg.classList.remove('hidden');
            }
        });

        // ถ้า login ค้างไว้แล้ว ให้ข้ามไปหน้า panel เลย
        if (localStorage.getItem('currentAdmin')) {
            window.location.href = 'admin_panel.html';
        }
    </script>
</body>
</html>
