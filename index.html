<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายรับ-รายจ่าย (Offline Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">บันทึกรายรับ-รายจ่าย</h1>
            <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-medium">บันทึกลงเครื่อง (Local)</span>
        </div>

        <!-- Balance Section -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6 flex justify-between items-center">
            <div>
                <p class="text-gray-500 text-sm">ยอดเงินคงเหลือ</p>
                <p id="total-balance" class="text-3xl font-bold text-gray-800">฿0.00</p>
            </div>
            <div class="text-right">
                <div class="mb-2">
                    <p class="text-gray-500 text-xs">รายรับรวม</p>
                    <p id="total-income" class="text-lg font-semibold text-green-500">+฿0.00</p>
                </div>
                <div>
                    <p class="text-gray-500 text-xs">รายจ่ายรวม</p>
                    <p id="total-expense" class="text-lg font-semibold text-red-500">-฿0.00</p>
                </div>
            </div>
        </div>

        <!-- Monthly Summary Section -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">สรุปรายเดือน</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-500 text-sm border-b">
                            <th class="pb-2 font-medium">เดือน/ปี</th>
                            <th class="pb-2 font-medium text-right">รายรับ</th>
                            <th class="pb-2 font-medium text-right">รายจ่าย</th>
                            <th class="pb-2 font-medium text-right">คงเหลือ</th>
                        </tr>
                    </thead>
                    <tbody id="monthly-summary-body" class="divide-y divide-gray-100">
                        <!-- Monthly data will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">เพิ่มรายการใหม่</h2>
            <form id="transaction-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">รายการ</label>
                    <input type="text" id="title" required placeholder="เช่น เงินเดือน, ค่าอาหาร" 
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">จำนวนเงิน</label>
                        <input type="number" step="0.01" id="amount" required placeholder="0.00" 
                            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">ประเภท</label>
                        <select id="type" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                            <option value="income">รายรับ (+)</option>
                            <option value="expense">รายจ่าย (-)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-medium">
                    บันทึกรายการ
                </button>
            </form>
        </div>

        <!-- Transaction History -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <h2 class="text-xl font-semibold p-6 border-b">ประวัติรายการ</h2>
            <div id="transaction-list" class="divide-y divide-gray-200 max-h-[400px] overflow-y-auto">
                <!-- Transactions will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        const form = document.getElementById('transaction-form');
        const transactionList = document.getElementById('transaction-list');
        const totalBalance = document.getElementById('total-balance');
        const totalIncome = document.getElementById('total-income');
        const totalExpense = document.getElementById('total-expense');
        const monthlySummaryBody = document.getElementById('monthly-summary-body');

        function updateUI() {
            // Update List
            transactionList.innerHTML = '';
            let income = 0;
            let expense = 0;
            const monthlyData = {};

            if (transactions.length === 0) {
                transactionList.innerHTML = '<p class="p-6 text-center text-gray-500">ยังไม่มีข้อมูลรายการ</p>';
            }

            transactions.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach((t, index) => {
                const date = new Date(t.date);
                const monthYear = `${date.getMonth() + 1}/${date.getFullYear()}`;
                
                // Monthly Summary Logic
                if (!monthlyData[monthYear]) {
                    monthlyData[monthYear] = { income: 0, expense: 0 };
                }

                const amount = parseFloat(t.amount);
                if (t.type === 'income') {
                    income += amount;
                    monthlyData[monthYear].income += amount;
                } else {
                    expense += amount;
                    monthlyData[monthYear].expense += amount;
                }

                // Append to List UI
                const div = document.createElement('div');
                div.className = 'p-4 flex justify-between items-center hover:bg-gray-50 transition';
                div.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="w-2 h-10 rounded ${t.type === 'income' ? 'bg-green-500' : 'bg-red-500'}"></div>
                        <div>
                            <p class="font-medium text-gray-800">${t.title}</p>
                            <p class="text-xs text-gray-400">${date.toLocaleString('th-TH')}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <p class="font-semibold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">
                            ${t.type === 'income' ? '+' : '-'}฿${amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </p>
                        <button onclick="deleteTransaction(${t.id})" class="text-gray-300 hover:text-red-500 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                `;
                transactionList.appendChild(div);
            });

            // Update Totals
            const balance = income - expense;
            totalBalance.innerText = `฿${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            totalBalance.className = `text-3xl font-bold ${balance >= 0 ? 'text-green-600' : 'text-red-600'}`;
            totalIncome.innerText = `+฿${income.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            totalExpense.innerText = `-฿${expense.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            // Update Monthly Summary Table
            monthlySummaryBody.innerHTML = '';
            const sortedMonths = Object.keys(monthlyData).sort((a, b) => {
                const [m1, y1] = a.split('/');
                const [m2, y2] = b.split('/');
                return new Date(y2, m2-1) - new Date(y1, m1-1);
            });

            if (sortedMonths.length === 0) {
                monthlySummaryBody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-gray-400 text-sm">ยังไม่มีข้อมูลสรุป</td></tr>';
            } else {
                sortedMonths.forEach(mYear => {
                    const data = monthlyData[mYear];
                    const mBalance = data.income - data.expense;
                    const tr = document.createElement('tr');
                    tr.className = 'text-sm';
                    tr.innerHTML = `
                        <td class="py-3 font-medium">${mYear}</td>
                        <td class="py-3 text-right text-green-600">+฿${data.income.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        <td class="py-3 text-right text-red-600">-฿${data.expense.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        <td class="py-3 text-right font-semibold ${mBalance >= 0 ? 'text-blue-600' : 'text-red-600'}">
                            ฿${mBalance.toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </td>
                    `;
                    monthlySummaryBody.appendChild(tr);
                });
            }

            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newTransaction = {
                id: Date.now(),
                title: document.getElementById('title').value,
                amount: document.getElementById('amount').value,
                type: document.getElementById('type').value,
                date: new Date().toISOString()
            };
            transactions.push(newTransaction);
            form.reset();
            updateUI();
        });

        window.deleteTransaction = function(id) {
            if (confirm('ต้องการลบรายการนี้ใช่ไหม?')) {
                transactions = transactions.filter(t => t.id !== id);
                updateUI();
            }
        }

        updateUI();
    </script>
</body>
</html>
