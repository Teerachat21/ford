<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายรับ-รายจ่าย (Admin Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Login/Register Section -->
    <div id="auth-section" class="flex items-center justify-center min-h-screen">
        <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
            <h2 id="auth-title" class="text-2xl font-bold text-center text-gray-800 mb-6">เข้าสู่ระบบ</h2>
            
            <div id="auth-error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm"></div>
            <div id="auth-success" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 text-sm"></div>

            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">ชื่อผู้ใช้</label>
                    <input type="text" id="username" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">รหัสผ่าน</label>
                    <input type="password" id="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" id="auth-btn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition font-medium">เข้าสู่ระบบ</button>
            </form>
            <p class="mt-4 text-center text-sm text-gray-600">
                <span id="auth-toggle-text">ยังไม่มีบัญชี?</span> 
                <a href="#" id="auth-toggle-btn" class="text-blue-600 hover:underline">สมัครสมาชิก</a>
            </p>
        </div>
    </div>

    <!-- User Section (Main Content) -->
    <div id="main-content" class="hidden max-w-2xl mx-auto py-10 px-4">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">บันทึกรายรับ-รายจ่าย</h1>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-gray-600">สวัสดี, <strong id="display-name"></strong></span>
                <button onclick="logout()" class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded-md hover:bg-red-200 transition">ออกจากระบบ</button>
            </div>
        </div>

        <!-- Balance Section -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6 flex justify-between items-center">
            <div>
                <p class="text-gray-500 text-sm">ยอดเงินคงเหลือ</p>
                <p id="total-balance" class="text-3xl font-bold">฿0.00</p>
            </div>
            <div class="text-right">
                <div class="mb-2">
                    <p class="text-gray-500 text-xs">รายรับรวม</p>
                    <p id="total-income" class="text-lg font-semibold text-green-500">+฿0.00</p>
                </div>
                <div>
                    <p class="text-gray-500 text-xs">รายจ่ายรวม</p>
                    <p id="total-expense" class="text-lg font-semibold text-red-500">-฿0.00</p>
                </div>
            </div>
        </div>

        <!-- Monthly Summary -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">สรุปรายเดือน</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-500 text-sm border-b">
                            <th class="pb-2 font-medium">เดือน/ปี</th>
                            <th class="pb-2 font-medium text-right">รายรับ</th>
                            <th class="pb-2 font-medium text-right">รายจ่าย</th>
                            <th class="pb-2 font-medium text-right">คงเหลือ</th>
                        </tr>
                    </thead>
                    <tbody id="monthly-summary-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">เพิ่มรายการใหม่</h2>
            <form id="transaction-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">รายการ</label>
                    <input type="text" id="title" required placeholder="เช่น เงินเดือน, ค่าอาหาร" 
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">จำนวนเงิน</label>
                        <input type="number" step="0.01" id="amount" required placeholder="0.00" 
                            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">ประเภท</label>
                        <select id="type" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                            <option value="income">รายรับ (+)</option>
                            <option value="expense">รายจ่าย (-)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition font-medium">บันทึกรายการ</button>
            </form>
        </div>

        <!-- History -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <h2 class="text-xl font-semibold p-6 border-b">ประวัติรายการ</h2>
            <div id="transaction-list" class="divide-y divide-gray-200 max-h-[400px] overflow-y-auto"></div>
        </div>
    </div>

    <script>
        // State Management
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let users = JSON.parse(localStorage.getItem('users')) || [
            { id: 1, username: 'admin', password: 'admin8888', role: 'admin' }
        ];
        let allTransactions = JSON.parse(localStorage.getItem('allTransactions')) || [];
        let isLoginView = true;

        // Elements
        const authSection = document.getElementById('auth-section');
        const mainContent = document.getElementById('main-content');
        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authBtn = document.getElementById('auth-btn');
        const authToggleBtn = document.getElementById('auth-toggle-btn');
        const authToggleText = document.getElementById('auth-toggle-text');
        const authError = document.getElementById('auth-error');
        const authSuccess = document.getElementById('auth-success');
        const displayName = document.getElementById('display-name');

        const transactionForm = document.getElementById('transaction-form');
        const transactionList = document.getElementById('transaction-list');
        const totalBalance = document.getElementById('total-balance');
        const totalIncome = document.getElementById('total-income');
        const totalExpense = document.getElementById('total-expense');
        const monthlySummaryBody = document.getElementById('monthly-summary-body');

        // Initial check for default admin
        if (!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify(users));
        } else {
            // Update admin password if it's still the old one
            let existingUsers = JSON.parse(localStorage.getItem('users'));
            let adminIndex = existingUsers.findIndex(u => u.username === 'admin');
            if (adminIndex !== -1 && existingUsers[adminIndex].password === 'admin1234') {
                existingUsers[adminIndex].password = 'admin8888';
                localStorage.setItem('users', JSON.stringify(existingUsers));
                users = existingUsers;
            }
        }

        // Authentication Logic
        authToggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginView = !isLoginView;
            authTitle.innerText = isLoginView ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
            authBtn.innerText = isLoginView ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
            authToggleText.innerText = isLoginView ? 'ยังไม่มีบัญชี?' : 'มีบัญชีอยู่แล้ว?';
            authToggleBtn.innerText = isLoginView ? 'สมัครสมาชิก' : 'เข้าสู่ระบบ';
            authError.classList.add('hidden');
            authSuccess.classList.add('hidden');
        });

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (isLoginView) {
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    login(user);
                } else {
                    showError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
                }
            } else {
                if (users.find(u => u.username === username)) {
                    showError('ชื่อผู้ใช้นี้มีอยู่ในระบบแล้ว');
                } else {
                    const newUser = { id: Date.now(), username, password, role: 'user' };
                    users.push(newUser);
                    localStorage.setItem('users', JSON.stringify(users));
                    showSuccess('สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ');
                    authToggleBtn.click();
                }
            }
        });

        function login(user) {
            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(user));
            authSection.classList.add('hidden');
            
            if (user.role === 'admin') {
                window.location.href = 'admin_panel.html';
            } else {
                mainContent.classList.remove('hidden');
                displayName.innerText = user.username;
                updateUI();
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            authSection.classList.remove('hidden');
            mainContent.classList.add('hidden');
            authForm.reset();
        }

        function showError(msg) {
            authError.innerText = msg;
            authError.classList.remove('hidden');
            authSuccess.classList.add('hidden');
        }

        function showSuccess(msg) {
            authSuccess.innerText = msg;
            authSuccess.classList.remove('hidden');
            authError.classList.add('hidden');
        }

        // User UI Update
        function updateUI() {
            if (!currentUser) return;

            const userTransactions = allTransactions.filter(t => t.userId === currentUser.id);
            transactionList.innerHTML = '';
            let income = 0, expense = 0;
            const monthlyData = {};

            userTransactions.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(t => {
                const date = new Date(t.date);
                const monthYear = `${date.getMonth() + 1}/${date.getFullYear()}`;
                if (!monthlyData[monthYear]) monthlyData[monthYear] = { income: 0, expense: 0 };

                const amt = parseFloat(t.amount);
                if (t.type === 'income') {
                    income += amt;
                    monthlyData[monthYear].income += amt;
                } else {
                    expense += amt;
                    monthlyData[monthYear].expense += amt;
                }

                const div = document.createElement('div');
                div.className = 'p-4 flex justify-between items-center hover:bg-gray-50 transition';
                div.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="w-2 h-10 rounded ${t.type === 'income' ? 'bg-green-500' : 'bg-red-500'}"></div>
                        <div>
                            <p class="font-medium text-gray-800">${t.title}</p>
                            <p class="text-xs text-gray-400">${date.toLocaleString('th-TH')}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <p class="font-semibold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">
                            ${t.type === 'income' ? '+' : '-'}฿${amt.toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </p>
                        <button onclick="deleteTransaction(${t.id})" class="text-gray-300 hover:text-red-500 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                `;
                transactionList.appendChild(div);
            });

            if (userTransactions.length === 0) {
                transactionList.innerHTML = '<p class="p-6 text-center text-gray-500">ยังไม่มีข้อมูลรายการ</p>';
            }

            const balance = income - expense;
            totalBalance.innerText = `฿${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            totalBalance.className = `text-3xl font-bold ${balance >= 0 ? 'text-green-600' : 'text-red-600'}`;
            totalIncome.innerText = `+฿${income.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            totalExpense.innerText = `-฿${expense.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            monthlySummaryBody.innerHTML = '';
            const sortedMonths = Object.keys(monthlyData).sort((a, b) => {
                const [m1, y1] = a.split('/'), [m2, y2] = b.split('/');
                return new Date(y2, m2-1) - new Date(y1, m1-1);
            });

            sortedMonths.forEach(mYear => {
                const d = monthlyData[mYear];
                const mb = d.income - d.expense;
                const tr = document.createElement('tr');
                tr.className = 'text-sm';
                tr.innerHTML = `
                    <td class="py-3 font-medium">${mYear}</td>
                    <td class="py-3 text-right text-green-600">+฿${d.income.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="py-3 text-right text-red-600">-฿${d.expense.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="py-3 text-right font-semibold ${mb >= 0 ? 'text-blue-600' : 'text-red-600'}">฿${mb.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                `;
                monthlySummaryBody.appendChild(tr);
            });
            if (sortedMonths.length === 0) {
                monthlySummaryBody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-gray-400 text-sm">ยังไม่มีข้อมูลสรุป</td></tr>';
            }
        }

        transactionForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newT = {
                id: Date.now(),
                userId: currentUser.id,
                title: document.getElementById('title').value,
                amount: document.getElementById('amount').value,
                type: document.getElementById('type').value,
                date: new Date().toISOString()
            };
            allTransactions.push(newT);
            localStorage.setItem('allTransactions', JSON.stringify(allTransactions));
            transactionForm.reset();
            updateUI();
        });

        window.deleteTransaction = function(id) {
            if (confirm('ต้องการลบรายการนี้ใช่ไหม?')) {
                allTransactions = allTransactions.filter(t => t.id !== id);
                localStorage.setItem('allTransactions', JSON.stringify(allTransactions));
                updateUI();
            }
        };

        // Init
        if (currentUser) login(currentUser);
    </script>
</body>
</html>
